# Synthea configuration for medical-coding-ml
# Run with: java -jar synthea-with-dependencies.jar -c synthea.properties -p N

# ---------------------------------------------------------------------------
# Exporters — what file formats to write
# ---------------------------------------------------------------------------
exporter.fhir.export                  = false
exporter.csv.export                   = true
exporter.csv.folder_per_run           = true
exporter.csv.append_mode              = false
exporter.csv.included_files           = patients.csv,encounters.csv,conditions.csv,procedures.csv,medications.csv,observations.csv

# ---------------------------------------------------------------------------
# Codes — include ICD-10 mappings alongside SNOMED
# ---------------------------------------------------------------------------
exporter.use_icd10_codes              = true

# ---------------------------------------------------------------------------
# Realism settings
# ---------------------------------------------------------------------------
generate.only_alive_patients          = false
generate.append_numbers_to_person_names = false

# ---------------------------------------------------------------------------
# Output directory
# ---------------------------------------------------------------------------
exporter.baseDirectory                = ./output/